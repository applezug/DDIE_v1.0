# DDI-E NASA Battery - DDIE-03 实验专用配置
# 沿用 20260205 报告优化：测试集使用训练集 global_min/max 归一化，report_original_scale
# 与 DDIE02 区分：检查点与产出目录使用 DDIE03

model:
  target: Models.ddie.ddie_model.DDI_E
  params:
    seq_length: 128
    feature_size: 1
    n_layer_enc: 4
    n_layer_dec: 2
    d_model: 128
    timesteps: 1000
    sampling_timesteps: 200
    loss_type: 'l1'
    beta_schedule: 'cosine'
    n_heads: 8
    mlp_hidden_times: 4
    attn_pd: 0.0
    resid_pd: 0.0
    kernel_size: 1
    padding_size: 0
    use_mask_condition: true
    freq_loss_weight: 0.1
    use_trend_cycle: false

solver:
  base_lr: 1.0e-4
  max_epochs: 200
  results_folder: ./Checkpoints_ddie_nasa_DDIE03
  gradient_accumulate_every: 1
  save_cycle: 50
  early_stop_patience: 20
  ema:
    decay: 0.999
    update_interval: 5
  scheduler:
    target: engine.lr_sch.ReduceLROnPlateauWithWarmup
    params:
      factor: 0.5
      patience: 20
      min_lr: 1.0e-6
      threshold: 1.0e-2
      threshold_mode: rel
      warmup_lr: 1.0e-4
      warmup: 100
      verbose: False

dataloader:
  train_dataset:
    target: Utils.Data_utils.nasa_battery_dataset.NASABatteryDataset
    params:
      data_root: ./Data/datasets/nasa_battery/NASA Battery Data Set/5. Battery Data Set
      battery_ids: ['B0005', 'B0006', 'B0007']
      window: 128
      seed: 42
      period: train
      val_ratio: 0.2
      neg_one_to_one: true

  val_dataset:
    target: Utils.Data_utils.nasa_battery_dataset.NASABatteryDataset
    params:
      data_root: ./Data/datasets/nasa_battery/NASA Battery Data Set/5. Battery Data Set
      battery_ids: ['B0005', 'B0006', 'B0007']
      window: 128
      seed: 42
      period: val
      val_ratio: 0.2
      neg_one_to_one: true

  test_dataset:
    target: Utils.Data_utils.nasa_battery_dataset.NASABatteryDataset
    params:
      data_root: ./Data/datasets/nasa_battery/NASA Battery Data Set/5. Battery Data Set
      battery_ids: ['B0018']
      window: 128
      seed: 42
      period: test
      neg_one_to_one: true

  batch_size: 32
  shuffle: true
  num_workers: 4
  drop_last: true
  pin_memory: true

experiment:
  missing_rates: [0.1, 0.3, 0.5, 0.7, 0.9]
  n_masks_per_sample: 5
  seeds: [42, 123, 2024]
  eval_batch_size: 32
  uncertainty_samples: 20
  report_original_scale: true
